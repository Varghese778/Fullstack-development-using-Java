<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Gradients & Shadows -->
    <linearGradient id="gradUI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#add8e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#87ceeb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradBackend" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a29bfe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradDB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#55efc4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradAPI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdcb6e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffeaa7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    
    <!-- Arrowhead -->
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d3436" />
    </marker>
  </defs>

  <rect width="800" height="500" fill="#fdfdfd" rx="15" />
  
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2d3436" text-anchor="middle">System Architecture Overview</text>

  <!-- User / Browser Node -->
  <g transform="translate(50, 200)" filter="url(#shadow)">
    <rect width="140" height="80" rx="10" fill="url(#gradUI)" />
    <text x="70" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2d3436" text-anchor="middle">Client Layer</text>
    <text x="70" y="55" font-family="Arial, sans-serif" font-size="12" fill="#2d3436" text-anchor="middle">Glassmorphism UI</text>
    <text x="70" y="70" font-family="Arial, sans-serif" font-size="12" fill="#2d3436" text-anchor="middle">(Thymeleaf/JS)</text>
  </g>

  <!-- Connection: Client to Backend -->
  <line x1="190" y1="240" x2="310" y2="240" stroke="#2d3436" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)" />
  <text x="250" y="230" font-family="Arial, sans-serif" font-size="12" fill="#2d3436" text-anchor="middle">HTTPS / REST</text>

  <!-- Application Server (Spring Boot) -->
  <g transform="translate(320, 150)" filter="url(#shadow)">
    <rect width="180" height="180" rx="15" fill="url(#gradBackend)" />
    <text x="90" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Service Layer</text>
    <text x="90" y="60" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Spring Boot</text>
    
    <rect x="20" y="80" width="140" height="30" rx="5" fill="#ffffff" fill-opacity="0.2" />
    <text x="90" y="100" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Spring Security</text>

    <rect x="20" y="120" width="140" height="30" rx="5" fill="#ffffff" fill-opacity="0.2" />
    <text x="90" y="140" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">JPA / Hibernate</text>
  </g>

  <!-- Connection: Backend to Database -->
  <path d="M 410 330 L 410 380" stroke="#2d3436" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)" fill="none" />
  <text x="450" y="360" font-family="Arial, sans-serif" font-size="12" fill="#2d3436" text-anchor="middle">JPA (SQL)</text>

  <!-- Database Node -->
  <g transform="translate(340, 390)" filter="url(#shadow)">
    <rect width="140" height="80" rx="10" fill="url(#gradDB)" />
    <text x="70" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2d3436" text-anchor="middle">Data Layer</text>
    <text x="70" y="55" font-family="Arial, sans-serif" font-size="14" fill="#2d3436" text-anchor="middle">H2 / MySQL</text>
  </g>

  <!-- Connection: Backend to AI APIs -->
  <line x1="500" y1="200" x2="610" y2="150" stroke="#2d3436" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)" />
  <text x="555" y="165" font-family="Arial, sans-serif" font-size="12" fill="#2d3436" text-anchor="middle">JSON API</text>

  <!-- ASI:ONE AI Module -->
  <g transform="translate(620, 90)" filter="url(#shadow)">
    <rect width="140" height="80" rx="10" fill="url(#gradAPI)" />
    <text x="70" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2d3436" text-anchor="middle">ASI:ONE LLM</text>
    <text x="70" y="55" font-family="Arial, sans-serif" font-size="12" fill="#2d3436" text-anchor="middle">Resume Parsing &amp;</text>
    <text x="70" y="70" font-family="Arial, sans-serif" font-size="12" fill="#2d3436" text-anchor="middle">Recommendation</text>
  </g>

  <!-- Connection: Backend to PDFBox -->
  <line x1="500" y1="270" x2="610" y2="300" stroke="#2d3436" stroke-width="2" marker-end="url(#arrow)" />
  <text x="560" y="300" font-family="Arial, sans-serif" font-size="12" fill="#2d3436" text-anchor="middle">File Read</text>

  <!-- PDFBox Module -->
  <g transform="translate(620, 260)" filter="url(#shadow)">
    <rect width="140" height="80" rx="10" fill="#dfe6e9" />
    <text x="70" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2d3436" text-anchor="middle">Apache PDFBox</text>
    <text x="70" y="55" font-family="Arial, sans-serif" font-size="12" fill="#2d3436" text-anchor="middle">Document Text</text>
    <text x="70" y="70" font-family="Arial, sans-serif" font-size="12" fill="#2d3436" text-anchor="middle">Extraction</text>
  </g>
</svg>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('Notifications')}"></head>
<body class="d-flex flex-column min-vh-100"><nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container mt-5 pt-4 flex-grow-1">
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show"><span th:text="${message}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="bi bi-bell me-2"></i>Notifications <span th:if="${unreadCount > 0}" class="badge bg-danger" th:text="${unreadCount}"></span></h2>
        <form th:action="@{/notifications/mark-all-read}" method="post"><button class="btn btn-outline-primary btn-sm"><i class="bi bi-check-all me-1"></i>Mark all read</button></form>
    </div>
    <div class="list-group">
        <div th:each="n : ${notifications.content}" class="list-group-item d-flex justify-content-between align-items-center" th:classappend="${!n.isRead} ? 'list-group-item-light border-start border-primary border-4' : ''">
            <div>
                <h6 class="mb-1 fw-bold" th:text="${n.subject}">Subject</h6>
                <p class="mb-1 small" th:text="${n.message}">Message</p>
                <small class="text-muted" th:text="${#temporals.format(n.createdAt, 'dd MMM yyyy HH:mm')}"></small>
            </div>
            <div class="d-flex gap-1">
                <form th:if="${!n.isRead}" th:action="@{/notifications/{id}/mark-read(id=${n.notificationId})}" method="post"><button class="btn btn-sm btn-outline-success"><i class="bi bi-check"></i></button></form>
                <form th:action="@{/notifications/{id}/delete(id=${n.notificationId})}" method="post"><button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button></form>
            </div>
        </div>
    </div>
    <p th:if="${notifications.content.isEmpty()}" class="text-center text-muted py-5"><i class="bi bi-bell-slash display-4"></i><br/>No notifications yet.</p>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>

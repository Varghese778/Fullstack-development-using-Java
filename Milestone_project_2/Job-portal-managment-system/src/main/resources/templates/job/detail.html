<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Job Detail')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container mt-5 pt-4 flex-grow-1">
    <div class="row">
        <div class="col-lg-8">
            <div class="card glass-card p-4">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div>
                        <h2 class="fw-bold mb-1" th:text="${job.jobTitle}">Job Title</h2>
                        <p class="text-muted mb-0"><i class="bi bi-building me-1"></i><span th:text="${job.companyName}">Company</span></p>
                    </div>
                    <span class="badge fs-6" th:classappend="${job.status.name() == 'ACTIVE'} ? 'bg-success' : 'bg-secondary'" th:text="${job.status}">Status</span>
                </div>
                <div class="d-flex flex-wrap gap-2 mb-4">
                    <span th:if="${job.employmentType}" class="badge bg-primary-subtle text-primary"><i class="bi bi-clock me-1"></i><span th:text="${job.employmentType}"></span></span>
                    <span th:if="${job.experienceLevel}" class="badge bg-warning-subtle text-warning"><i class="bi bi-star me-1"></i><span th:text="${job.experienceLevel}"></span></span>
                    <span th:if="${job.remotePolicy}" class="badge bg-info-subtle text-info"><i class="bi bi-geo-alt me-1"></i><span th:text="${job.remotePolicy}"></span></span>
                    <span th:if="${job.salaryMin != null}" class="badge bg-success-subtle text-success"><i class="bi bi-currency-rupee me-1"></i><span th:text="${job.salaryMin + ' - ' + job.salaryMax}"></span></span>
                </div>
                <h5 class="fw-bold">Job Description</h5>
                <div class="mb-4" th:utext="${job.jobDescription}"></div>
                <div th:if="${job.benefits != null}" class="mb-4">
                    <h5 class="fw-bold">Benefits</h5>
                    <p th:text="${job.benefits}"></p>
                </div>
                <div th:if="${job.skillsRequired != null}" class="mb-4">
                    <h5 class="fw-bold">Skills Required</h5>
                    <p th:text="${job.skillsRequired}"></p>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card glass-card p-4 mb-3">
                <h5 class="fw-bold mb-3">Job Summary</h5>
                <ul class="list-unstyled">
                    <li class="mb-2"><i class="bi bi-people me-2 text-primary"></i>Positions: <strong th:text="${job.numberOfPositions}">1</strong></li>
                    <li class="mb-2"><i class="bi bi-eye me-2 text-info"></i>Views: <strong th:text="${job.viewCount}">0</strong></li>
                    <li class="mb-2"><i class="bi bi-file-earmark me-2 text-success"></i>Applications: <strong th:text="${job.applicationCount}">0</strong></li>
                    <li th:if="${job.applicationDeadline != null}" class="mb-2"><i class="bi bi-calendar me-2 text-danger"></i>Deadline: <strong th:text="${job.applicationDeadline}">N/A</strong></li>
                    <li th:if="${job.department != null}" class="mb-2"><i class="bi bi-diagram-3 me-2"></i>Dept: <strong th:text="${job.department}">N/A</strong></li>
                </ul>
                <a sec:authorize="hasRole('STUDENT')" th:href="@{/apply/{id}(id=${job.jobId})}" class="btn btn-primary w-100 py-2 fw-semibold">
                    <i class="bi bi-send me-1"></i>Apply Now
                </a>
            </div>
            <a th:href="@{/jobs}" class="btn btn-outline-secondary w-100"><i class="bi bi-arrow-left me-1"></i>Back to Jobs</a>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

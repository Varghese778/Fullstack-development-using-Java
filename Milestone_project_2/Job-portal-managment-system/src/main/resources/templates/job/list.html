<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Browse Jobs')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container mt-5 pt-4 flex-grow-1">
    <h2 class="fw-bold mb-2"><i class="bi bi-briefcase me-2"></i>Browse Jobs</h2>
    <p class="text-muted mb-4">Find your next opportunity</p>
    <!-- Search -->
    <form th:action="@{/jobs}" method="get" class="mb-4">
        <div class="input-group input-group-lg">
            <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
            <input type="text" name="keyword" class="form-control" placeholder="Search job title, company, keywords..." th:value="${keyword}"/>
            <button type="submit" class="btn btn-primary px-4">Search</button>
        </div>
    </form>
    <!-- Job Cards -->
    <div class="row g-4">
        <div th:each="job : ${jobs.content}" class="col-md-6 col-lg-4">
            <div class="card glass-card h-100 job-card">
                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title fw-bold mb-0" th:text="${job.jobTitle}">Job Title</h5>
                        <span class="badge bg-success-subtle text-success" th:text="${job.employmentType}">Type</span>
                    </div>
                    <p class="text-muted mb-2"><i class="bi bi-building me-1"></i><span th:text="${job.companyName}">Company</span></p>
                    <div class="mb-2">
                        <span th:if="${job.salaryMin != null}" class="badge bg-primary-subtle text-primary me-1">
                            <i class="bi bi-currency-rupee"></i><span th:text="${job.salaryMin + ' - ' + job.salaryMax}"></span>
                        </span>
                        <span th:if="${job.experienceLevel != null}" class="badge bg-warning-subtle text-warning" th:text="${job.experienceLevel}">Exp</span>
                    </div>
                    <p class="card-text small text-muted flex-grow-1" th:text="${#strings.abbreviate(job.jobDescription, 120)}">Description</p>
                    <div class="d-flex justify-content-between align-items-center mt-auto pt-2 border-top">
                        <small class="text-muted"><i class="bi bi-eye me-1"></i><span th:text="${job.viewCount}">0</span> views</small>
                        <a th:href="@{/jobs/{id}(id=${job.jobId})}" class="btn btn-sm btn-outline-primary">View Details</a>
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${jobs.content.isEmpty()}" class="col-12 text-center py-5">
            <i class="bi bi-search display-1 text-muted"></i>
            <h4 class="mt-3 text-muted">No jobs found</h4>
            <p>Try adjusting your search criteria</p>
        </div>
    </div>
    <!-- Pagination -->
    <nav th:if="${jobs.totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${jobs.first} ? 'disabled'">
                <a class="page-link" th:href="@{/jobs(page=${jobs.number - 1}, keyword=${keyword})}">Previous</a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, jobs.totalPages - 1)}" class="page-item" th:classappend="${i == jobs.number} ? 'active'">
                <a class="page-link" th:href="@{/jobs(page=${i}, keyword=${keyword})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${jobs.last} ? 'disabled'">
                <a class="page-link" th:href="@{/jobs(page=${jobs.number + 1}, keyword=${keyword})}">Next</a>
            </li>
        </ul>
    </nav>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>

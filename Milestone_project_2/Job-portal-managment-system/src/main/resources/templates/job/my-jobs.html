<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('My Jobs')}"></head>
<body class="d-flex flex-column min-vh-100"><nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container mt-5 pt-4 flex-grow-1">
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show"><span th:text="${message}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0"><i class="bi bi-list-check me-2"></i>My Jobs</h2>
        <a th:href="@{/jobs/post}" class="btn btn-success"><i class="bi bi-plus me-1"></i>Post New Job</a>
    </div>
    <div class="mb-3 d-flex flex-wrap gap-2">
        <a th:href="@{/employer/my-jobs}" class="btn btn-sm" th:classappend="${currentStatus == null} ? 'btn-primary' : 'btn-outline-primary'">All</a>
        <a th:each="s : ${ {'DRAFT','ACTIVE','CLOSED','EXPIRED','ARCHIVED'} }" th:href="@{/employer/my-jobs(status=${s})}" class="btn btn-sm" th:classappend="${currentStatus == s} ? 'btn-primary' : 'btn-outline-primary'" th:text="${s}"></a>
    </div>
    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-dark"><tr><th>Title</th><th>Status</th><th>Views</th><th>Apps</th><th>Deadline</th><th>Actions</th></tr></thead>
            <tbody>
                <tr th:each="job : ${jobs.content}">
                    <td class="fw-bold" th:text="${job.jobTitle}"></td>
                    <td><span class="badge" th:classappend="${job.status.name() == 'ACTIVE'} ? 'bg-success' : ${job.status.name() == 'DRAFT'} ? 'bg-secondary' : ${job.status.name() == 'CLOSED'} ? 'bg-danger' : 'bg-warning text-dark'" th:text="${job.status}"></span></td>
                    <td th:text="${job.viewCount}"></td>
                    <td th:text="${job.applicationCount}"></td>
                    <td th:text="${job.applicationDeadline}"></td>
                    <td class="d-flex gap-1 flex-wrap">
                        <a th:href="@{/jobs/{id}(id=${job.jobId})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-eye"></i></a>
                        <a th:href="@{/jobs/{id}/edit(id=${job.jobId})}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-pencil"></i></a>
                        <form th:if="${job.status.name() == 'DRAFT'}" th:action="@{/jobs/{id}/publish(id=${job.jobId})}" method="post"><button class="btn btn-sm btn-success"><i class="bi bi-broadcast"></i></button></form>
                        <form th:if="${job.status.name() == 'ACTIVE'}" th:action="@{/jobs/{id}/close(id=${job.jobId})}" method="post"><button class="btn btn-sm btn-outline-danger"><i class="bi bi-x-circle"></i></button></form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <p th:if="${jobs.content.isEmpty()}" class="text-center text-muted py-5">No jobs posted yet. <a th:href="@{/jobs/post}">Post your first job!</a></p>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('Search Jobs')}"></head>
<body class="d-flex flex-column min-vh-100"><nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container mt-5 pt-4 flex-grow-1">
    <h2 class="fw-bold mb-4"><i class="bi bi-search me-2"></i>Advanced Job Search</h2>
    <form th:action="@{/jobs/search}" method="get" class="mb-4">
        <div class="input-group input-group-lg"><span class="input-group-text bg-white"><i class="bi bi-search"></i></span><input type="text" name="keyword" class="form-control" placeholder="Search..." th:value="${keyword}"/><button type="submit" class="btn btn-primary px-4">Search</button></div>
    </form>
    <div th:if="${jobs != null}" class="row g-4">
        <div th:each="job : ${jobs.content}" class="col-md-6 col-lg-4">
            <div class="card glass-card h-100 job-card">
                <div class="card-body"><h5 class="fw-bold" th:text="${job.jobTitle}"></h5><p class="text-muted" th:text="${job.companyName}"></p><a th:href="@{/jobs/{id}(id=${job.jobId})}" class="btn btn-sm btn-outline-primary">View</a></div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>

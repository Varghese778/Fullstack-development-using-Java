<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('500 Server Error')}"></head>
<body class="auth-body d-flex flex-column min-vh-100 justify-content-center align-items-center">
<div class="text-center"><i class="bi bi-exclamation-triangle display-1 text-danger"></i><h2 class="fw-bold mt-3">500 — Server Error</h2><p class="text-muted" th:text="${message} ?: 'An unexpected error occurred. Please try again later.'"></p><a th:href="@{/}" class="btn btn-primary mt-3">Go Home</a></div>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('Edit Company Profile')}"></head>
<body class="d-flex flex-column min-vh-100"><nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container mt-5 pt-4 flex-grow-1">
    <h2 class="fw-bold mb-4"><i class="bi bi-pencil-square me-2"></i>Edit Company Profile</h2>
    <div class="card glass-card p-4">
        <form th:action="@{/employer/profile/edit}" method="post">
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">Company Name</label><input type="text" name="companyName" class="form-control" th:value="${employer.companyName}"/></div>
                <div class="col-md-6"><label class="form-label">Website</label><input type="url" name="companyWebsite" class="form-control" th:value="${employer.companyWebsite}"/></div>
                <div class="col-md-6"><label class="form-label">Phone</label><input type="tel" name="phoneNumber" class="form-control" th:value="${employer.phoneNumber}"/></div>
                <div class="col-md-6"><label class="form-label">Headquarters</label><input type="text" name="headquartersLocation" class="form-control" th:value="${employer.headquartersLocation}"/></div>
                <div class="col-md-4"><label class="form-label">Industry</label><select name="industry" class="form-select"><option value="">Select</option><option value="IT" th:selected="${employer.industry?.name() == 'IT'}">IT</option><option value="FINANCE" th:selected="${employer.industry?.name() == 'FINANCE'}">Finance</option><option value="HEALTHCARE" th:selected="${employer.industry?.name() == 'HEALTHCARE'}">Healthcare</option><option value="OTHER" th:selected="${employer.industry?.name() == 'OTHER'}">Other</option></select></div>
                <div class="col-md-4"><label class="form-label">Size</label><select name="companySize" class="form-select"><option value="">Select</option><option value="STARTUP" th:selected="${employer.companySize?.name() == 'STARTUP'}">Startup</option><option value="SMALL" th:selected="${employer.companySize?.name() == 'SMALL'}">Small</option><option value="MEDIUM" th:selected="${employer.companySize?.name() == 'MEDIUM'}">Medium</option><option value="LARGE" th:selected="${employer.companySize?.name() == 'LARGE'}">Large</option><option value="ENTERPRISE" th:selected="${employer.companySize?.name() == 'ENTERPRISE'}">Enterprise</option></select></div>
                <div class="col-md-4"><label class="form-label">Founded Year</label><input type="number" name="foundedYear" class="form-control" th:value="${employer.foundedYear}"/></div>
                <div class="col-12"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="4" th:text="${employer.description}"></textarea></div>
                <div class="col-md-6"><label class="form-label">Contact Person</label><input type="text" name="contactPerson" class="form-control" th:value="${employer.contactPerson}"/></div>
                <div class="col-md-6"><label class="form-label">Contact Email</label><input type="email" name="contactEmail" class="form-control" th:value="${employer.contactEmail}"/></div>
                <div class="col-md-6"><label class="form-label">GST Number</label><input type="text" name="gstNumber" class="form-control" th:value="${employer.gstNumber}"/></div>
            </div>
            <div class="mt-4"><button type="submit" class="btn btn-primary"><i class="bi bi-check me-1"></i>Save</button> <a th:href="@{/employer/profile}" class="btn btn-outline-secondary ms-2">Cancel</a></div>
        </form>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>

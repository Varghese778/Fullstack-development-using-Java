<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Employer Dashboard')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container mt-5 pt-4 flex-grow-1">
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show"><span th:text="${message}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-1"><span th:text="${employer.companyName}">Company</span> Dashboard</h2>
            <p class="text-muted mb-0">Manage your jobs and candidates</p>
        </div>
        <a th:href="@{/jobs/post}" class="btn btn-success"><i class="bi bi-plus-circle me-1"></i>Post a Job</a>
    </div>
    <div class="row g-4 mb-4">
        <div class="col-md-4 col-lg">
            <div class="card glass-card stat-card text-center p-3">
                <i class="bi bi-briefcase-fill display-6 text-primary"></i>
                <h3 class="fw-bold mt-2 mb-0" th:text="${stats.totalJobs}">0</h3>
                <small class="text-muted">Total Jobs</small>
            </div>
        </div>
        <div class="col-md-4 col-lg">
            <div class="card glass-card stat-card text-center p-3">
                <i class="bi bi-broadcast display-6 text-success"></i>
                <h3 class="fw-bold mt-2 mb-0" th:text="${stats.activeJobs}">0</h3>
                <small class="text-muted">Active Jobs</small>
            </div>
        </div>
        <div class="col-md-4 col-lg">
            <div class="card glass-card stat-card text-center p-3">
                <i class="bi bi-people-fill display-6 text-info"></i>
                <h3 class="fw-bold mt-2 mb-0" th:text="${stats.totalApplicationsReceived}">0</h3>
                <small class="text-muted">Applications</small>
            </div>
        </div>
        <div class="col-md-4 col-lg">
            <div class="card glass-card stat-card text-center p-3">
                <i class="bi bi-star-fill display-6 text-warning"></i>
                <h3 class="fw-bold mt-2 mb-0" th:text="${stats.shortlistedCandidates}">0</h3>
                <small class="text-muted">Shortlisted</small>
            </div>
        </div>
        <div class="col-md-4 col-lg">
            <div class="card glass-card stat-card text-center p-3">
                <i class="bi bi-trophy-fill display-6 text-success"></i>
                <h3 class="fw-bold mt-2 mb-0" th:text="${stats.hiredCandidates}">0</h3>
                <small class="text-muted">Hired</small>
            </div>
        </div>
    </div>
    <div class="row g-3">
        <div class="col-md-4"><a th:href="@{/employer/my-jobs}" class="btn btn-primary w-100 py-3"><i class="bi bi-list-check me-2"></i>Manage Jobs</a></div>
        <div class="col-md-4"><a th:href="@{/employer/applications}" class="btn btn-outline-primary w-100 py-3"><i class="bi bi-people me-2"></i>Review Applications</a></div>
        <div class="col-md-4"><a th:href="@{/employer/profile}" class="btn btn-outline-secondary w-100 py-3"><i class="bi bi-building me-2"></i>Company Profile</a></div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>

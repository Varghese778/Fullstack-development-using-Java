<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('Company Profile')}"></head>
<body class="d-flex flex-column min-vh-100"><nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container mt-5 pt-4 flex-grow-1">
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show"><span th:text="${message}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="bi bi-building me-2"></i>Company Profile</h2>
        <a th:href="@{/employer/profile/edit}" class="btn btn-primary"><i class="bi bi-pencil me-1"></i>Edit</a>
    </div>
    <div class="card glass-card p-4 mb-4">
        <h4 class="fw-bold" th:text="${employer.companyName}">Company</h4>
        <span th:if="${employer.isVerified}" class="badge bg-success mb-2"><i class="bi bi-patch-check me-1"></i>Verified</span>
        <span th:if="${!employer.isVerified}" class="badge bg-warning text-dark mb-2">Pending Verification</span>
        <p th:if="${employer.description}" th:text="${employer.description}"></p>
        <div class="row mt-3">
            <div class="col-md-6"><p><i class="bi bi-envelope me-2"></i><span th:text="${employer.email}"></span></p></div>
            <div class="col-md-6" th:if="${employer.phoneNumber}"><p><i class="bi bi-phone me-2"></i><span th:text="${employer.phoneNumber}"></span></p></div>
            <div class="col-md-6" th:if="${employer.industry}"><p><i class="bi bi-tag me-2"></i>Industry: <strong th:text="${employer.industry}"></strong></p></div>
            <div class="col-md-6" th:if="${employer.companySize}"><p><i class="bi bi-people me-2"></i>Size: <strong th:text="${employer.companySize}"></strong></p></div>
            <div class="col-md-6" th:if="${employer.headquartersLocation}"><p><i class="bi bi-geo-alt me-2"></i><span th:text="${employer.headquartersLocation}"></span></p></div>
            <div class="col-md-6" th:if="${employer.companyWebsite}"><p><i class="bi bi-globe me-2"></i><a th:href="${employer.companyWebsite}" target="_blank" th:text="${employer.companyWebsite}"></a></p></div>
        </div>
    </div>
    <!-- Team -->
    <div class="card glass-card p-4 mb-4">
        <h5 class="fw-bold mb-3"><i class="bi bi-people me-2"></i>Team Members</h5>
        <button class="btn btn-sm btn-outline-primary mb-3" data-bs-toggle="collapse" data-bs-target="#addTeam"><i class="bi bi-plus"></i> Add Member</button>
        <div id="addTeam" class="collapse mb-3">
            <form th:action="@{/employer/team/add}" method="post" class="card card-body bg-light">
                <div class="row g-2"><div class="col-md-4"><input type="text" name="name" class="form-control" placeholder="Name" required/></div><div class="col-md-4"><input type="email" name="email" class="form-control" placeholder="Email" required/></div><div class="col-md-3"><select name="role" class="form-select"><option>RECRUITER</option><option>MANAGER</option></select></div><div class="col-md-1"><button type="submit" class="btn btn-primary btn-sm">Add</button></div></div>
            </form>
        </div>
        <div th:each="m : ${teamMembers}" class="d-flex justify-content-between align-items-center border-bottom py-2">
            <div><strong th:text="${m.name}"></strong> <small class="text-muted ms-2" th:text="${m.email}"></small> <span class="badge bg-secondary ms-1" th:text="${m.role}"></span></div>
            <form th:action="@{/employer/team/{id}/remove(id=${m.memberId})}" method="post"><button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button></form>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>

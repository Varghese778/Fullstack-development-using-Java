<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('My Applications')}"></head>
<body class="d-flex flex-column min-vh-100"><nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container mt-5 pt-4 flex-grow-1">
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show"><span th:text="${message}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <h2 class="fw-bold mb-4"><i class="bi bi-file-earmark-text me-2"></i>My Applications</h2>
    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-dark"><tr><th>#</th><th>Job Title</th><th>Company</th><th>Status</th><th>Applied</th><th>Actions</th></tr></thead>
            <tbody>
                <tr th:each="app, iter : ${applications.content}">
                    <td th:text="${iter.index + 1}"></td>
                    <td><a th:href="@{/jobs/{id}(id=${app.job.jobId})}" class="fw-bold text-decoration-none" th:text="${app.job.jobTitle}"></a></td>
                    <td th:text="${app.job.companyName}"></td>
                    <td>
                        <span class="badge" th:classappend="${app.status.name() == 'SUBMITTED' ? 'bg-info' : app.status.name() == 'SHORTLISTED' ? 'bg-warning text-dark' : app.status.name() == 'REJECTED' ? 'bg-danger' : app.status.name() == 'HIRED' ? 'bg-success' : app.status.name() == 'WITHDRAWN' ? 'bg-secondary' : 'bg-primary'}" th:text="${app.status}"></span>
                    </td>
                    <td th:text="${#temporals.format(app.applicationDate, 'dd MMM yyyy')}"></td>
                    <td>
                        <a th:href="@{/applications/{id}(id=${app.applicationId})}" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-eye"></i></a>
                        <form th:if="${app.status.name() != 'WITHDRAWN' and app.status.name() != 'REJECTED' and app.status.name() != 'HIRED'}" th:action="@{/applications/{id}/withdraw(id=${app.applicationId})}" method="post" class="d-inline">
                            <button class="btn btn-sm btn-outline-danger" onclick="return confirm('Withdraw this application?')"><i class="bi bi-x-circle"></i></button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <p th:if="${applications.content.isEmpty()}" class="text-center text-muted py-5">You haven't applied to any jobs yet. <a th:href="@{/jobs}">Browse Jobs</a></p>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>

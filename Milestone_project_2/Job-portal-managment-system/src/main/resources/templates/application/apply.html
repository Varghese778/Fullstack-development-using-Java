<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('Apply for Job')}"></head>
<body class="d-flex flex-column min-vh-100"><nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container mt-5 pt-4 flex-grow-1">
    <div th:if="${error}" class="alert alert-danger"><span th:text="${error}"></span></div>
    <h2 class="fw-bold mb-4"><i class="bi bi-send me-2"></i>Apply for: <span th:text="${job.jobTitle}"></span></h2>
    <div class="row">
        <div class="col-lg-8">
            <div class="card glass-card p-4">
                <form th:action="@{/apply/{id}(id=${job.jobId})}" method="post" th:object="${applicationRequest}">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Select Resume</label>
                        <select th:field="*{resumeId}" class="form-select">
                            <option value="">-- No resume --</option>
                            <option th:each="r : ${resumes}" th:value="${r.resumeId}" th:text="${r.originalFileName + (r.isPrimary ? ' (Primary)' : '')}"></option>
                        </select>
                        <small class="text-muted">Don't have one? <a th:href="@{/resumes}">Upload here</a></small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Cover Letter</label>
                        <textarea th:field="*{coverLetter}" class="form-control" rows="6" placeholder="Why are you a great fit for this role?"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary py-2 px-4"><i class="bi bi-send me-1"></i>Submit Application</button>
                    <a th:href="@{/jobs/{id}(id=${job.jobId})}" class="btn btn-outline-secondary ms-2">Cancel</a>
                </form>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card glass-card p-4">
                <h5 class="fw-bold">Job Summary</h5>
                <p><i class="bi bi-building me-1"></i><span th:text="${job.companyName}"></span></p>
                <p th:if="${job.salaryMin}"><i class="bi bi-currency-rupee me-1"></i><span th:text="${job.salaryMin + ' - ' + job.salaryMax}"></span></p>
                <p th:if="${job.employmentType}"><i class="bi bi-clock me-1"></i><span th:text="${job.employmentType}"></span></p>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>

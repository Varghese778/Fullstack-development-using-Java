<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('Schedule Interview')}"></head>
<body class="d-flex flex-column min-vh-100"><nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container mt-5 pt-4 flex-grow-1">
    <h2 class="fw-bold mb-4"><i class="bi bi-camera-video me-2"></i>Schedule Interview</h2>
    <div class="card glass-card p-4">
        <p>Candidate: <strong th:text="${application.user.fullName}"></strong> | Job: <strong th:text="${application.job.jobTitle}"></strong></p>
        <form th:action="@{/employer/applications/{id}/schedule-interview(id=${application.applicationId})}" method="post" th:object="${interviewRequest}">
            <div class="row g-3">
                <div class="col-md-4"><label class="form-label">Date</label><input type="date" th:field="*{interviewDate}" class="form-control" required/></div>
                <div class="col-md-4"><label class="form-label">Time</label><input type="time" th:field="*{interviewTime}" class="form-control" required/></div>
                <div class="col-md-4"><label class="form-label">Type</label><select th:field="*{interviewType}" class="form-select"><option value="VIDEO">Video Call</option><option value="PHONE">Phone</option><option value="IN_PERSON">In Person</option></select></div>
                <div class="col-md-6"><label class="form-label">Location / Link</label><input type="text" th:field="*{interviewLocation}" class="form-control" placeholder="Office address or leave blank"/></div>
                <div class="col-md-6"><label class="form-label">Video Call Link</label><input type="url" th:field="*{videoCallLink}" class="form-control" placeholder="https://meet.google.com/..."/></div>
                <div class="col-12"><label class="form-label">Notes</label><textarea th:field="*{notes}" class="form-control" rows="3"></textarea></div>
            </div>
            <div class="mt-4"><button type="submit" class="btn btn-primary"><i class="bi bi-calendar-check me-1"></i>Schedule</button> <a th:href="@{/employer/applications}" class="btn btn-outline-secondary ms-2">Cancel</a></div>
        </form>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>

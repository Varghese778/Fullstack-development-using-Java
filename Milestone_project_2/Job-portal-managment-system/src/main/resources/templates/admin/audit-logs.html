<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('Audit Logs')}"></head>
<body class="d-flex flex-column min-vh-100"><nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container mt-5 pt-4 flex-grow-1">
    <h2 class="fw-bold mb-4"><i class="bi bi-journal-text me-2"></i>Audit Logs</h2>
    <div class="table-responsive"><table class="table table-sm table-hover"><thead class="table-dark"><tr><th>Time</th><th>User ID</th><th>Action</th><th>Resource</th><th>Result</th></tr></thead>
        <tbody><tr th:each="log : ${logs.content}"><td th:text="${#temporals.format(log.timestamp, 'dd MMM HH:mm:ss')}"></td><td th:text="${log.userId}"></td><td><span class="badge bg-info" th:text="${log.action}"></span></td><td th:text="${log.resourceType}"></td><td><span class="badge" th:classappend="${log.result == 'SUCCESS'} ? 'bg-success' : 'bg-danger'" th:text="${log.result}"></span></td></tr></tbody></table></div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>

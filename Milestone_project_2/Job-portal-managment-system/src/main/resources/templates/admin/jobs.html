<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('Manage Jobs')}"></head>
<body class="d-flex flex-column min-vh-100"><nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container mt-5 pt-4 flex-grow-1">
    <h2 class="fw-bold mb-4"><i class="bi bi-briefcase me-2"></i>Manage Jobs (Admin)</h2>
    <div class="table-responsive"><table class="table table-hover align-middle"><thead class="table-dark"><tr><th>Title</th><th>Company</th><th>Status</th><th>Views</th><th>Apps</th><th>Actions</th></tr></thead>
        <tbody><tr th:each="job : ${jobs.content}"><td th:text="${job.jobTitle}"></td><td th:text="${job.companyName}"></td><td><span class="badge bg-success" th:text="${job.status}"></span></td><td th:text="${job.viewCount}"></td><td th:text="${job.applicationCount}"></td><td><a th:href="@{/jobs/{id}(id=${job.jobId})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-eye"></i></a></td></tr></tbody></table></div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('Manage Users')}"></head>
<body class="d-flex flex-column min-vh-100"><nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container mt-5 pt-4 flex-grow-1">
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show"><span th:text="${message}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <h2 class="fw-bold mb-4"><i class="bi bi-people me-2"></i>Manage Users</h2>
    <form th:action="@{/admin/users}" method="get" class="mb-4"><div class="input-group"><input type="text" name="keyword" class="form-control" placeholder="Search by name or email..." th:value="${keyword}"/><button class="btn btn-primary">Search</button></div></form>
    <div class="table-responsive"><table class="table table-hover align-middle"><thead class="table-dark"><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
        <tbody><tr th:each="u : ${users.content}"><td th:text="${u.fullName}"></td><td th:text="${u.email}"></td><td><span class="badge bg-primary" th:text="${u.role}"></span></td><td><span class="badge" th:classappend="${u.isActive} ? 'bg-success' : 'bg-danger'" th:text="${u.isActive} ? 'Active' : 'Inactive'"></span></td><td th:text="${#temporals.format(u.createdAt, 'dd MMM yyyy')}"></td>
            <td><form th:if="${u.isActive}" th:action="@{/admin/users/{id}/deactivate(id=${u.userId})}" method="post" class="d-inline"><button class="btn btn-sm btn-outline-danger">Deactivate</button></form><form th:if="${!u.isActive}" th:action="@{/admin/users/{id}/activate(id=${u.userId})}" method="post" class="d-inline"><button class="btn btn-sm btn-outline-success">Activate</button></form></td></tr></tbody></table></div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Admin Dashboard')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container mt-5 pt-4 flex-grow-1">
    <h2 class="fw-bold mb-4"><i class="bi bi-speedometer2 me-2"></i>Admin Dashboard</h2>
    <div class="row g-4 mb-4">
        <div class="col-md-4 col-lg-2">
            <div class="card glass-card stat-card text-center p-3 border-start border-primary border-4">
                <h4 class="fw-bold mb-0" th:text="${stats.totalUsers}">0</h4>
                <small class="text-muted">Job Seekers</small>
            </div>
        </div>
        <div class="col-md-4 col-lg-2">
            <div class="card glass-card stat-card text-center p-3 border-start border-success border-4">
                <h4 class="fw-bold mb-0" th:text="${stats.totalEmployers}">0</h4>
                <small class="text-muted">Employers</small>
            </div>
        </div>
        <div class="col-md-4 col-lg-2">
            <div class="card glass-card stat-card text-center p-3 border-start border-info border-4">
                <h4 class="fw-bold mb-0" th:text="${stats.newUsersThisMonth}">0</h4>
                <small class="text-muted">New This Month</small>
            </div>
        </div>
        <div class="col-md-4 col-lg-2">
            <div class="card glass-card stat-card text-center p-3 border-start border-warning border-4">
                <h4 class="fw-bold mb-0" th:text="${stats.totalJobsPosted}">0</h4>
                <small class="text-muted">Active Jobs</small>
            </div>
        </div>
        <div class="col-md-4 col-lg-2">
            <div class="card glass-card stat-card text-center p-3 border-start border-secondary border-4">
                <h4 class="fw-bold mb-0" th:text="${stats.totalApplicationsSystem}">0</h4>
                <small class="text-muted">Applications</small>
            </div>
        </div>
        <div class="col-md-4 col-lg-2">
            <div class="card glass-card stat-card text-center p-3 border-start border-danger border-4">
                <h4 class="fw-bold mb-0" th:text="${stats.totalHires}">0</h4>
                <small class="text-muted">Total Hires</small>
            </div>
        </div>
    </div>
    <div class="row g-3">
        <div class="col-md-3"><a th:href="@{/admin/users}" class="btn btn-primary w-100 py-3"><i class="bi bi-people me-2"></i>Manage Users</a></div>
        <div class="col-md-3"><a th:href="@{/admin/employers}" class="btn btn-success w-100 py-3"><i class="bi bi-building me-2"></i>Manage Employers</a></div>
        <div class="col-md-3"><a th:href="@{/admin/jobs}" class="btn btn-info w-100 py-3 text-white"><i class="bi bi-briefcase me-2"></i>Manage Jobs</a></div>
        <div class="col-md-3"><a th:href="@{/admin/audit-logs}" class="btn btn-outline-secondary w-100 py-3"><i class="bi bi-journal-text me-2"></i>Audit Logs</a></div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>

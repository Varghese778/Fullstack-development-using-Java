<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('Manage Employers')}"></head>
<body class="d-flex flex-column min-vh-100"><nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container mt-5 pt-4 flex-grow-1">
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show"><span th:text="${message}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <h2 class="fw-bold mb-4"><i class="bi bi-building me-2"></i>Manage Employers</h2>
    <div class="mb-3 d-flex gap-2"><a th:href="@{/admin/employers}" class="btn btn-sm" th:classappend="${currentStatus == null} ? 'btn-primary' : 'btn-outline-primary'">All</a><a th:href="@{/admin/employers(status='PENDING')}" class="btn btn-sm" th:classappend="${currentStatus == 'PENDING'} ? 'btn-warning' : 'btn-outline-warning'">Pending</a><a th:href="@{/admin/employers(status='APPROVED')}" class="btn btn-sm" th:classappend="${currentStatus == 'APPROVED'} ? 'btn-success' : 'btn-outline-success'">Approved</a><a th:href="@{/admin/employers(status='REJECTED')}" class="btn btn-sm" th:classappend="${currentStatus == 'REJECTED'} ? 'btn-danger' : 'btn-outline-danger'">Rejected</a></div>
    <div class="table-responsive"><table class="table table-hover align-middle"><thead class="table-dark"><tr><th>Company</th><th>Email</th><th>Industry</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
        <tbody><tr th:each="e : ${employers.content}"><td th:text="${e.companyName}"></td><td th:text="${e.email}"></td><td th:text="${e.industry}"></td><td><span class="badge" th:classappend="${e.approvalStatus?.name() == 'APPROVED'} ? 'bg-success' : ${e.approvalStatus?.name() == 'REJECTED'} ? 'bg-danger' : 'bg-warning text-dark'" th:text="${e.approvalStatus}"></span></td><td th:text="${#temporals.format(e.createdAt, 'dd MMM yyyy')}"></td>
            <td class="d-flex gap-1"><form th:if="${e.approvalStatus?.name() != 'APPROVED'}" th:action="@{/admin/employers/{id}/verify(id=${e.employerId})}" method="post"><button class="btn btn-sm btn-success"><i class="bi bi-check-circle"></i> Verify</button></form><form th:if="${e.approvalStatus?.name() != 'REJECTED'}" th:action="@{/admin/employers/{id}/reject(id=${e.employerId})}" method="post"><button class="btn btn-sm btn-outline-danger"><i class="bi bi-x"></i></button></form></td></tr></tbody></table></div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>

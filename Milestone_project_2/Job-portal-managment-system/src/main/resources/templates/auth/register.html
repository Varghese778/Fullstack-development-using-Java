<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Register')}"></head>
<body class="auth-body d-flex flex-column min-vh-100">
<div class="container d-flex justify-content-center align-items-center flex-grow-1 py-5">
    <div class="auth-card p-4 p-md-5" style="max-width:520px;width:100%">
        <div class="text-center mb-4">
            <i class="bi bi-person-plus-fill display-4" th:classappend="${type == 'employer'} ? 'text-success' : 'text-primary'"></i>
            <h2 class="mt-2 fw-bold" th:text="${type == 'employer'} ? 'Employer Registration' : 'Job Seeker Registration'">Register</h2>
        </div>
        <div th:if="${error}" class="alert alert-danger"><i class="bi bi-exclamation-triangle me-1"></i><span th:text="${error}"></span></div>
        <form th:action="@{/register(type=${type})}" method="post" th:object="${registerRequest}">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-medium">First Name</label>
                    <input type="text" th:field="*{firstName}" class="form-control" required/>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-medium">Last Name</label>
                    <input type="text" th:field="*{lastName}" class="form-control" required/>
                </div>
                <div class="col-12">
                    <label class="form-label fw-medium">Email Address</label>
                    <input type="email" th:field="*{email}" class="form-control" required/>
                </div>
                <div class="col-12">
                    <label class="form-label fw-medium">Phone Number</label>
                    <input type="tel" th:field="*{phoneNumber}" class="form-control"/>
                </div>
                <!-- Employer-specific fields -->
                <div th:if="${type == 'employer'}" class="col-12">
                    <label class="form-label fw-medium">Company Name</label>
                    <input type="text" th:field="*{companyName}" class="form-control" th:required="${type == 'employer'}"/>
                </div>
                <div th:if="${type == 'employer'}" class="col-md-6">
                    <label class="form-label fw-medium">Industry</label>
                    <select th:field="*{industry}" class="form-select">
                        <option value="">Select</option>
                        <option value="IT">IT</option><option value="FINANCE">Finance</option>
                        <option value="HEALTHCARE">Healthcare</option><option value="EDUCATION">Education</option>
                        <option value="MANUFACTURING">Manufacturing</option><option value="MARKETING">Marketing</option>
                        <option value="CONSULTING">Consulting</option><option value="OTHER">Other</option>
                    </select>
                </div>
                <div th:if="${type == 'employer'}" class="col-md-6">
                    <label class="form-label fw-medium">Company Size</label>
                    <select th:field="*{companySize}" class="form-select">
                        <option value="">Select</option>
                        <option value="STARTUP">Startup (1-10)</option><option value="SMALL">Small (11-50)</option>
                        <option value="MEDIUM">Medium (51-200)</option><option value="LARGE">Large (201-1000)</option>
                        <option value="ENTERPRISE">Enterprise (1000+)</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-medium">Password</label>
                    <input type="password" th:field="*{password}" class="form-control" minlength="8" required/>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-medium">Confirm Password</label>
                    <input type="password" th:field="*{confirmPassword}" class="form-control" minlength="8" required/>
                </div>
            </div>
            <button type="submit" class="btn w-100 py-2 fw-semibold mt-4"
                    th:classappend="${type == 'employer'} ? 'btn-success' : 'btn-primary'">
                <i class="bi bi-person-plus me-1"></i>Create Account
            </button>
        </form>
        <hr class="my-4"/>
        <div class="text-center">
            <p class="mb-0">Already have an account? <a th:href="@{/login}" class="fw-semibold">Sign In</a></p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

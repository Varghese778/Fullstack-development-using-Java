<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Forgot Password')}"></head>
<body class="auth-body d-flex flex-column min-vh-100">
<div class="container d-flex justify-content-center align-items-center flex-grow-1">
    <div class="auth-card p-4 p-md-5" style="max-width:460px;width:100%">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock display-4 text-warning"></i>
            <h2 class="mt-2 fw-bold">Forgot Password?</h2>
            <p class="text-muted">Enter your email and we'll send you a reset link.</p>
        </div>
        <div th:if="${error}" class="alert alert-danger"><span th:text="${error}"></span></div>
        <div th:if="${message}" class="alert alert-success"><span th:text="${message}"></span></div>
        <form th:action="@{/forgot-password}" method="post">
            <div class="mb-3">
                <label class="form-label fw-medium">Email Address</label>
                <input type="email" name="email" class="form-control" required autofocus/>
            </div>
            <button type="submit" class="btn btn-warning w-100 py-2 fw-semibold">
                <i class="bi bi-send me-1"></i>Send Reset Link
            </button>
        </form>
        <div class="text-center mt-3"><a th:href="@{/login}" class="text-decoration-none">Back to Login</a></div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

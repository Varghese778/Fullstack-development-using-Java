<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Login')}"></head>
<body class="auth-body d-flex flex-column min-vh-100">
<div class="container d-flex justify-content-center align-items-center flex-grow-1">
    <div class="auth-card p-4 p-md-5" style="max-width:460px;width:100%">
        <div class="text-center mb-4">
            <i class="bi bi-briefcase-fill display-4 text-primary"></i>
            <h2 class="mt-2 fw-bold">Welcome Back</h2>
            <p class="text-muted">Sign in to your Job Portal account</p>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle me-1"></i><span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-medium">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="username" class="form-control" placeholder="you@example.com" required autofocus/>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-medium">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
                </div>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-check">
                    <input type="checkbox" name="remember-me" class="form-check-input" id="rememberMe"/>
                    <label class="form-check-label" for="rememberMe">Remember me</label>
                </div>
                <a th:href="@{/forgot-password}" class="text-decoration-none small">Forgot password?</a>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
            </button>
        </form>
        <hr class="my-4"/>
        <div class="text-center">
            <p class="mb-2">Don't have an account?</p>
            <a th:href="@{/register?type=student}" class="btn btn-outline-primary me-2">Job Seeker</a>
            <a th:href="@{/register?type=employer}" class="btn btn-outline-success">Employer</a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

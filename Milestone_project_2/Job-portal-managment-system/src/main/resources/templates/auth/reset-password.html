<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Reset Password')}"></head>
<body class="auth-body d-flex flex-column min-vh-100">
<div class="container d-flex justify-content-center align-items-center flex-grow-1">
    <div class="auth-card p-4 p-md-5" style="max-width:460px;width:100%">
        <div class="text-center mb-4">
            <i class="bi bi-key display-4 text-info"></i>
            <h2 class="mt-2 fw-bold">Reset Password</h2>
        </div>
        <div th:if="${error}" class="alert alert-danger"><span th:text="${error}"></span></div>
        <form th:action="@{/reset-password}" method="post" th:object="${passwordResetRequest}">
            <input type="hidden" th:field="*{token}"/>
            <div class="mb-3">
                <label class="form-label fw-medium">New Password</label>
                <input type="password" th:field="*{newPassword}" class="form-control" minlength="8" required/>
            </div>
            <div class="mb-3">
                <label class="form-label fw-medium">Confirm Password</label>
                <input type="password" th:field="*{confirmPassword}" class="form-control" minlength="8" required/>
            </div>
            <button type="submit" class="btn btn-info w-100 py-2 fw-semibold text-white">
                <i class="bi bi-check-circle me-1"></i>Reset Password
            </button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

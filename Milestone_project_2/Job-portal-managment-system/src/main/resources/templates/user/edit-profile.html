<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('Edit Profile')}"></head>
<body class="d-flex flex-column min-vh-100"><nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container mt-5 pt-4 flex-grow-1">
    <h2 class="fw-bold mb-4"><i class="bi bi-pencil-square me-2"></i>Edit Profile</h2>
    <div class="card glass-card p-4">
        <form th:action="@{/profile/edit}" method="post">
            <div class="row g-3">
                <div class="col-md-12"><label class="form-label">Bio</label><textarea name="bio" class="form-control" rows="3" th:text="${user.bio}"></textarea></div>
                <div class="col-md-6"><label class="form-label">Phone</label><input type="tel" name="phoneNumber" class="form-control" th:value="${user.phoneNumber}"/></div>
                <div class="col-md-6"><label class="form-label">Location</label><input type="text" name="location" class="form-control" th:value="${user.location}"/></div>
                <div class="col-md-6"><label class="form-label">Portfolio URL</label><input type="url" name="portfolioUrl" class="form-control" th:value="${user.portfolioUrl}"/></div>
                <div class="col-md-6"><label class="form-label">LinkedIn URL</label><input type="url" name="linkedinUrl" class="form-control" th:value="${user.linkedinUrl}"/></div>
                <div class="col-md-6"><label class="form-label">GitHub URL</label><input type="url" name="githubUrl" class="form-control" th:value="${user.githubUrl}"/></div>
                <div class="col-md-6"><label class="form-label">Expected Salary (₹)</label><input type="number" name="expectedSalary" class="form-control" th:value="${user.expectedSalary}"/></div>
                <div class="col-md-6"><label class="form-label">Availability</label>
                    <select name="availabilityStatus" class="form-select">
                        <option value="AVAILABLE" th:selected="${user.availabilityStatus?.name() == 'AVAILABLE'}">Available</option>
                        <option value="NOT_AVAILABLE" th:selected="${user.availabilityStatus?.name() == 'NOT_AVAILABLE'}">Not Available</option>
                    </select>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary me-2"><i class="bi bi-check-circle me-1"></i>Save Changes</button>
                <a th:href="@{/profile}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>

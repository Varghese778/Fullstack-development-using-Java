<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark-glass fixed-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-briefcase-fill me-2"></i>JobPortal
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navContent">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/jobs}"><i class="bi bi-search me-1"></i>Browse Jobs</a></li>
                <li class="nav-item" sec:authorize="hasRole('STUDENT')"><a class="nav-link" th:href="@{/my-applications}"><i class="bi bi-file-earmark-text me-1"></i>My Applications</a></li>
                <li class="nav-item" sec:authorize="hasRole('STUDENT')"><a class="nav-link" th:href="@{/resumes}"><i class="bi bi-file-person me-1"></i>Resumes</a></li>
                <li class="nav-item" sec:authorize="hasRole('EMPLOYER')"><a class="nav-link" th:href="@{/employer/my-jobs}"><i class="bi bi-list-check me-1"></i>My Jobs</a></li>
                <li class="nav-item" sec:authorize="hasRole('EMPLOYER')"><a class="nav-link" th:href="@{/jobs/post}"><i class="bi bi-plus-circle me-1"></i>Post Job</a></li>
                <li class="nav-item" sec:authorize="hasRole('EMPLOYER')"><a class="nav-link" th:href="@{/employer/applications}"><i class="bi bi-people me-1"></i>Applications</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/admin/users}"><i class="bi bi-people me-1"></i>Users</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/admin/employers}"><i class="bi bi-building me-1"></i>Employers</a></li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link position-relative" th:href="@{/notifications}">
                        <i class="bi bi-bell-fill"></i>
                        <span id="notif-badge" class="badge rounded-pill bg-danger position-absolute top-0 start-100 translate-middle d-none">0</span>
                    </a>
                </li>
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i><span sec:authentication="name">User</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                        <li sec:authorize="hasRole('STUDENT')"><a class="dropdown-item" th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                        <li sec:authorize="hasRole('STUDENT')"><a class="dropdown-item" th:href="@{/profile}"><i class="bi bi-person me-2"></i>My Profile</a></li>
                        <li sec:authorize="hasRole('EMPLOYER')"><a class="dropdown-item" th:href="@{/employer/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                        <li sec:authorize="hasRole('EMPLOYER')"><a class="dropdown-item" th:href="@{/employer/profile}"><i class="bi bi-building me-2"></i>Company Profile</a></li>
                        <li sec:authorize="hasRole('ADMIN')"><a class="dropdown-item" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Admin Dashboard</a></li>
                        <li><hr class="dropdown-divider"/></li>
                        <li>
                            <form th:action="@{/logout}" method="post" class="d-inline">
                                <button type="submit" class="dropdown-item text-danger"><i class="bi bi-box-arrow-right me-2"></i>Logout</button>
                            </form>
                        </li>
                    </ul>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/login}"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</html>

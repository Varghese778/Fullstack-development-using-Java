# ============================================
# Job Portal Management System - Default Config
# ============================================
spring.application.name=Job Portal

# Active profile (dev by default)
spring.profiles.active=dev

# Server
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# JPA Common
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
upload.path=./uploads/resumes

# Mail (disabled by default - logs to console)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging
logging.level.com.jobportal=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Session
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
